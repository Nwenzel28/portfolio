<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <title>Best Pages</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sticky-top">
  <div class="header-top">
    <div class="site-name">Portfolio Collection</div>
    <div class="top-nav">
      <a href="index.html">Home</a>
      <a href="examples.html" class="active">Best Pages</a>
      <a href="numbers.html">2028</a>
    </div>
  </div>
</div>

<header class="rock-header">

  <h1>Best Pages</h1>

</header>

<main>
  <section>
    <ul>
      <li><a href="#">Example Student 1</a></li>
      <li><a href="#">Example Student 2</a></li>
      <li><a href="#">Example Student 3</a></li>
    </ul>
  </section>
</main>

<footer class="site-footer">
  <div class="footer-left">
    <p>Site &amp; Research by Nicholas Wenzel (<a href="mailto:nwenzel28@punahou.edu">nwenzel28@punahou.edu</a>)</p>
    <p>Used by students &amp; teachers!</p>
    <p>Now with <span id="footer-count">—</span> examples</p>
  </div>
  <div class="footer-right">
    <div class="footer-info-wrap">
      <span class="footer-info-icon">ℹ</span>
      <span class="footer-tooltip" id="footer-tooltip">—</span>
    </div>
    <a href="#" class="footer-top-btn" onclick="window.scrollTo({top:0,behavior:'smooth'});return false;">
      Back to top <span class="footer-arrow">↑</span>
    </a>
  </div>
</footer>

</body>
<script>
  window.addEventListener('scroll', function () {
    document.querySelector('.header-top').classList.toggle('scrolled', window.scrollY > 0);
  });

  const modified = new Date(document.lastModified);
  const now = new Date();
  const sameDay = modified.toDateString() === now.toDateString();
  const tooltipText = sameDay
    ? 'Last updated today at ' + modified.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'})
    : 'Last updated ' + modified.toLocaleDateString([], {month: 'long', day: 'numeric', year: 'numeric'});
  document.getElementById('footer-tooltip').textContent = tooltipText;

  // examples page has no script.js portfolios — set count manually
  const countEl = document.getElementById('footer-count');
  if (countEl) countEl.textContent = '60';
</script>
<script>
  window.addEventListener('scroll', function () {
    document.querySelector('.header-top').classList.toggle('scrolled', window.scrollY > 0);
  });
</script>
</html>
